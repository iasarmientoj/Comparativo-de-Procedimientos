<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos — MHCP</title>
    <!-- Google Fonts: Cormorant Garamond for elegant serif italic, Inter for clean modern sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="welcome.css">
</head>
<body class="welcome-body">
    <!-- Moving background blur circles for premium glassmorphism aesthetic -->
    <div class="bg-blur-container">
        <div class="blur-circle-wrapper circle-1">
            <div class="blur-circle-inner"></div>
        </div>
        <div class="blur-circle-wrapper circle-2">
            <div class="blur-circle-inner"></div>
        </div>
        <div class="blur-circle-wrapper circle-3">
            <div class="blur-circle-inner"></div>
        </div>
    </div>

    <!-- Clean, minimalist particle container for future effects -->
    <div class="welcome-container">
        <!-- Top Left: Bienvenidos -->
        <header class="welcome-header">
            <h1 class="welcome-title">Bienvenidos</h1>
        </header>

        <!-- Center: Core Information Block -->
        <main class="welcome-content">
            <div class="info-block">
                <h2 class="info-line primary-line">Sistema de Análisis Comparativo de Procedimientos</h2>
                <p class="info-line secondary-line">Contratación por Acuerdo Marco de Precios — MHCP</p>
                <p class="info-line tertiary-line">Ministerio de Hacienda y Crédito Público</p>
            </div>
        </main>

        <!-- Bottom Right: Enter Button -->
        <footer class="welcome-footer">
            <a href="index2.html" class="enter-btn">
                <span>Entrar</span>
                <svg class="arrow-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </footer>
    </div>

    <!-- JavaScript to handle smooth background circle repulsion from mouse cursor -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inners = document.querySelectorAll('.blur-circle-inner');
            let mouseX = 0;
            let mouseY = 0;
            
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            const circleStates = Array.from(inners).map(inner => ({
                element: inner,
                parent: inner.parentElement,
                currentX: 0,
                currentY: 0,
                targetX: 0,
                targetY: 0
            }));

            function animate() {
                circleStates.forEach(state => {
                    const rect = state.parent.getBoundingClientRect();
                    const circleX = rect.left + rect.width / 2;
                    const circleY = rect.top + rect.height / 2;

                    const dx = circleX - mouseX;
                    const dy = circleY - mouseY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    const repelRadius = 450; // Distance of repulsion
                    if (distance < repelRadius && distance > 0) {
                        const force = (repelRadius - distance) / repelRadius;
                        const maxRepel = 90; // Pixels to repel
                        state.targetX = (dx / distance) * maxRepel * force;
                        state.targetY = (dy / distance) * maxRepel * force;
                    } else {
                        state.targetX = 0;
                        state.targetY = 0;
                    }

                    // Lerp for high-end fluid motion
                    state.currentX += (state.targetX - state.currentX) * 0.08;
                    state.currentY += (state.targetY - state.currentY) * 0.08;

                    state.element.style.transform = `translate(${state.currentX}px, ${state.currentY}px)`;
                });

                requestAnimationFrame(animate);
            }

            animate();
        });
    </script>
</body>
</html>
