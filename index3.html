<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Análisis Comparativo de Procedimientos - MHCP</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="landing.css">
</head>

<body class="light-theme">
    <!-- Mouse-following Particle Background Canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- Floating Back to Top Button -->
    <button class="back-to-top" id="backToTop" onclick="scrollToTop()">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- HERO SCREEN (First Viewport) -->
    <section class="hero-screen" id="heroSec">
        <div class="hero-diagram-container">
            <div class="hero-logo">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Ministerio de Hacienda y Crédito Público</span>
            </div>

            <h1 class="hero-title">Sistema de Análisis Comparativo de Procedimientos<br>Contratación por Acuerdo Marco
                de Precios — MHCP</h1>

            <!-- SVG Diagram Connector Lines -->
            <div class="diagram-connector-wrap">
                <svg class="diagram-svg" viewBox="0 0 800 80" preserveAspectRatio="none">
                    <!-- Main vertical drop from title -->
                    <line x1="400" y1="0" x2="400" y2="40" class="diagram-line" />
                    <!-- Junction circle/dot -->
                    <circle cx="400" cy="40" r="5" class="diagram-junction" />
                    <!-- Horizontal branching line -->
                    <line x1="120" y1="40" x2="680" y2="40" class="diagram-line" />
                    <!-- Vertical drops to buttons -->
                    <line x1="120" y1="40" x2="120" y2="80" class="diagram-line" />
                    <line x1="400" y1="40" x2="400" y2="80" class="diagram-line" />
                    <line x1="680" y1="40" x2="680" y2="80" class="diagram-line" />
                </svg>
            </div>

            <div class="hero-buttons-grid">
                <a href="dashboard.html#actual" class="hero-card-btn">
                    <span>Procedimiento Actual</span>
                </a>
                <a href="dashboard.html#mejorado" class="hero-card-btn">
                    <span>Procedimiento Mejorado</span>
                </a>
                <a href="dashboard.html#simulador" class="hero-card-btn">
                    <span>Simulador</span>
                </a>
            </div>
        </div>
    </section>

    <!-- MAIN PANEL SECTION (Temporarily hidden for clean landing layout)
    <main class="main-container">

        <section class="section-panel" id="panelViejo">
            <div class="section-header">
                <span class="section-tag">[ Procedimiento Viejo ]</span>
                <h2>Flujo de Trabajo Anterior & Vulnerabilidades</h2>
                <p>Análisis de cómo la total concentración del trámite en el área técnica (Ingenieros de Sistemas) diluía la gobernanza y exponía a la entidad a nulidades contractuales.</p>
            </div>

            <div class="diagram-flow-container">
                <div class="diagram-canvas-card">
                    <div class="diagram-connection-line"></div>
                    <div class="diagram-nodes-grid" id="oldFlowNodes">
                    </div>
                </div>

                <aside class="light-sidebar" id="oldDetailSidebar">
                    <div class="sidebar-placeholder" id="oldSidebarPlaceholder">
                        <i class="fa-solid fa-circle-nodes"></i>
                        <h4>Detalle del Proceso</h4>
                        <p>Haz clic en cualquier nodo del diagrama de la izquierda para desplegar su análisis de vulnerabilidad, responsables y normativa colombiana afectada.</p>
                    </div>
                    <div class="sidebar-content hidden" id="oldSidebarContent">
                        <div class="sidebar-header">
                            <span class="sidebar-header-badge" id="oldStepTag">
                                <span class="diagram-tag">Paso A</span>
                            </span>
                            <h3 id="oldStepTitle">Título del Paso</h3>
                        </div>
                        <div class="sidebar-group">
                            <h5>Responsable Real:</h5>
                            <p id="oldStepResp">Cargando...</p>
                        </div>
                        <div class="sidebar-group alert-group">
                            <h5>Diagnóstico de Vulnerabilidad:</h5>
                            <p id="oldStepDiag">Cargando...</p>
                        </div>
                        <div class="sidebar-group">
                            <h5>Normativa Implicada (Decreto 1082 / Ley 80):</h5>
                            <p id="oldStepLaw">Cargando...</p>
                        </div>
                    </div>
                </aside>
            </div>
        </section>

        <section class="section-panel" id="panelNuevo">
            <div class="section-header">
                <span class="section-tag">[ Procedimiento Propuesto ]</span>
                <h2>Metodología de Control y Matriz de Roles (PHVA)</h2>
                <p>El nuevo procedimiento incorpora un Comité Evaluador formal (Técnico, Abogado, Financiero), puntos de control obligatorios, y verificación previa de deudores alimentarios (REDAM).</p>
            </div>

            <div class="phva-tabs-control">
                <button class="phva-tab-btn active" onclick="filterNewSteps('all')">Todos los Pasos</button>
                <button class="phva-tab-btn" onclick="filterNewSteps('P')"><span class="phva-dot P"></span> Planear (P)</button>
                <button class="phva-tab-btn" onclick="filterNewSteps('H')"><span class="phva-dot H"></span> Hacer (H)</button>
                <button class="phva-tab-btn" onclick="filterNewSteps('V')"><span class="phva-dot V"></span> Verificar (V)</button>
                <button class="phva-tab-btn" onclick="filterNewSteps('A')"><span class="phva-dot A"></span> Actuar (A)</button>
            </div>

            <div class="new-steps-container">
                <div class="new-steps-grid-layout" id="newStepsGrid">
                </div>

                <aside class="light-sidebar" id="newDetailSidebar">
                    <div class="sidebar-placeholder" id="newSidebarPlaceholder">
                        <i class="fa-solid fa-list-check"></i>
                        <h4>Ficha de Actividad</h4>
                        <p>Selecciona cualquier actividad del listado para ver su descripción formal, responsable asignado, puntos de control obligatorios y registros exigidos.</p>
                    </div>
                    <div class="sidebar-content hidden" id="newSidebarContent">
                        <div class="sidebar-header">
                            <span class="sidebar-header-badge" id="newStepTag">
                                <span class="phva-badge P">Planear</span>
                            </span>
                            <h3 id="newStepTitle">Actividad</h3>
                        </div>
                        <div class="sidebar-group">
                            <h5>Responsable Asignado:</h5>
                            <p id="newStepResp">Cargando...</p>
                        </div>
                        <div class="sidebar-group">
                            <h5>Descripción y Plazo:</h5>
                            <p id="newStepDesc">Cargando...</p>
                        </div>
                        <div class="sidebar-group success-group hidden" id="newStepControlBox">
                            <h5>Mecanismo de Control del Riesgo:</h5>
                            <p id="newStepControl">Cargando...</p>
                        </div>
                        <div class="sidebar-group">
                            <h5>Registros y Soportes Exigidos:</h5>
                            <p id="newStepRegs">Cargando...</p>
                        </div>
                    </div>
                </aside>
            </div>
        </section>

        <section class="section-panel" id="panelSimulador">
            <div class="section-header">
                <span class="section-tag">[ Simulaciones y Herramientas ]</span>
                <h2>Simulador de Estrés y Pre-Auditor Jurídico</h2>
                <p>Compara el impacto de contingencias contractuales típicas bajo ambas metodologías o audita la transparencia de un pliego de condiciones en tiempo real.</p>
            </div>

            <div class="light-grid-2col">
                
                <div class="light-simulator-card" id="simulatorContainer">
                    <div class="sim-box-header">
                        <i class="fa-solid fa-flask-bubble"></i>
                        <div>
                            <h3>Simulador de Estrés Contractual</h3>
                            <p>Somete un contrato público a contingencias reales para verificar el blindaje del procedimiento.</p>
                        </div>
                    </div>

                    <div class="select-wrapper">
                        <label for="simulationScenario">Selecciona un Escenario de Riesgo:</label>
                        <select id="simulationScenario" onchange="loadScenarioInfo()">
                            <option value="iva">Error de IVA en Oferta (Caso Nuevo Pangea)</option>
                            <option value="inhabilidad">Inhabilidad Sobrevenida del Representante Legal (REDAM/RUES)</option>
                            <option value="cambio">Modificación de Vigencias y Cantidades (Simulador)</option>
                        </select>
                    </div>

                    <div class="scenario-info-panel" id="scenarioDesc">
                    </div>

                    <div class="sim-actions-grid">
                        <button class="btn btn-danger" id="runOldSimBtn" onclick="runSimulation('old')">
                            <i class="fa-solid fa-circle-play"></i> Simular Proc. Viejo
                        </button>
                        <button class="btn btn-success" id="runNewSimBtn" onclick="runSimulation('new')">
                            <i class="fa-solid fa-circle-play"></i> Simular Proc. Nuevo
                        </button>
                    </div>

                    <div class="viewport-wrapper">
                        <div class="sim-indicator-text" id="simStageIndicator">Selecciona un escenario e inicia la simulación.</div>
                        <div class="viewport-progress-bar">
                            <div class="viewport-progress-fill" id="visualProgressFill"></div>
                        </div>
                        <div class="viewport-nodes-row" id="visualNodesRow">
                        </div>
                        
                        <div class="sim-output-box hidden" id="simResultBox">
                            <div class="result-icon-wrap" id="simResultIcon">
                                <i class="fa-solid fa-circle-xmark"></i>
                            </div>
                            <div class="result-text-wrap">
                                <h5 id="simResultTitle">Título</h5>
                                <p id="simResultText">Contenido del resultado...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="light-auditor-card" id="auditorContainer">
                    <div class="audit-box-header">
                        <i class="fa-solid fa-brain"></i>
                        <div>
                            <h3>Auditor de Pliegos e IA</h3>
                            <p>Audita cualquier documento de pliego de condiciones o estudio previo bajo el Decreto 1082.</p>
                        </div>
                    </div>

                    <div class="input-field-wrap">
                        <label for="geminiKey"><i class="fa-solid fa-key"></i> Llave de API Gemini (Opcional):</label>
                        <input type="password" id="geminiKey" placeholder="Pega tu llave de API de Gemini para auditoría por IA..." />
                        <span class="input-helper">Si no ingresas una llave, el sistema realizará un análisis de cumplimiento local mediante keywords.</span>
                    </div>

                    <div class="light-drop-zone" id="dropZone" ondragover="event.preventDefault()" ondrop="handleFileDrop(event)">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p>Arrastra y suelta aquí tu archivo de estudio previo (PDF o TXT)</p>
                        <span>o</span>
                        <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">
                            <i class="fa-solid fa-file-import"></i> Buscar Archivo
                        </button>
                        <input type="file" id="fileInput" class="hidden" accept=".txt,.pdf,.md" onchange="handleFileSelect(event)" />
                    </div>

                    <div class="input-field-wrap">
                        <label for="pasteText">O pega el texto del pliego aquí:</label>
                        <textarea id="pasteText" rows="5" placeholder="Pega el objeto contractual, la capacidad financiera o la matriz de riesgos del pliego a auditar..."></textarea>
                    </div>

                    <button class="btn btn-primary btn-full" id="runAuditBtn" onclick="runDocumentAudit()">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Ejecutar Auditoría de Transparencia
                    </button>

                    <div class="audit-loading-box hidden" id="auditLoadingBox">
                        <div class="spinner"></div>
                        <p id="auditLoadingText">Analizando contenido frente al Decreto 1082 de 2015...</p>
                    </div>

                    <div class="audit-results-card hidden" id="auditResultsBox">
                        <h5>Resultado de la Auditoría</h5>
                        <div class="score-radial-wrapper">
                            <span>Índice de Blindaje Normativo:</span>
                            <div class="score-radial">
                                <svg viewBox="0 0 36 36" class="circular-chart">
                                    <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                    <path class="circle" id="radialProgress" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                    <text x="18" y="20.35" class="percentage" id="scorePercent">0%</text>
                                </svg>
                            </div>
                        </div>

                        <div class="light-checklist-results" id="checklistResults">
                        </div>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <footer class="app-footer">
        <div class="footer-container">
            <p>&copy; 2026 Ministerio de Hacienda y Crédito Público - Consultoría de Gobernanza Pública. Prototipo de Adopción.</p>
            <div class="footer-links">
                <a href="#"><i class="fa-solid fa-book-bookmark"></i> Manual de Contratación</a>
                <a href="#"><i class="fa-solid fa-gavel"></i> Decreto 1082 de 2015</a>
            </div>
        </div>
    </footer>
    -->

    <!-- Core Logic -->
    <script src="landing-app.js"></script>
</body>

</html>
